<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>轮播图管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../libs/layui/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../libs/layui/css/public.css" media="all">
    <link rel="stylesheet" href="../../css/admin.css" media="all">
    <style>
        .banner-manage-page .layui-table-view .layui-table-body td[data-field="imgUrl"] .layui-table-cell {
            height: auto;
            line-height: normal;
            overflow: visible;
            padding-top: 8px;
            padding-bottom: 8px;
        }

        .banner-manage-page .banner-table-thumb {
            display: block;
            width: 140px;
            height: 64px;
            border-radius: 8px;
            object-fit: contain;
            cursor: pointer;
            border: 1px solid #e8eaec;
            background: #f8fafc;
        }
    </style>
</head>
<body class="banner-manage-page">
<div class="layuimini-container">
    <div class="layuimini-main">
        <table class="layui-hide" id="bannerTable" lay-filter="bannerTableFilter"></table>
    </div>
</div>

<script type="text/html" id="bannerToolbarRemoved">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-sm layui-btn-normal" lay-event="add">新增轮播图</button>
    </div>
</script>

<script type="text/html" id="bannerBar">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete">删除</a>
</script>

<script src="../../libs/layui/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<script src="../../js/AppConfig.js" charset="utf-8"></script>
<script src="../../js/admin-common.js" charset="utf-8"></script>
<script src="../../js/bannerManage.js" charset="utf-8"></script>
</body>
</html>
