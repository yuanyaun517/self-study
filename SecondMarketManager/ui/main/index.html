<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>校园二手交易后台</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../libs/layui/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../libs/layui/css/layuimini.css?v=2.0.4.2" media="all">
    <link rel="stylesheet" href="../../libs/layui/css/themes/default.css" media="all">
    <link rel="stylesheet" href="../../libs/layui/lib/font-awesome-4.7.0/css/font-awesome.min.css" media="all">
    <style id="layuimini-bg-color"></style>
    <style>
        .manager-nav-link {
            display: flex !important;
            align-items: center;
            gap: 10px;
            max-width: 220px;
        }

        .manager-nav-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            background: #eff6ff;
            border: 1px solid rgba(37, 99, 235, 0.14);
            flex-shrink: 0;
        }

        .manager-nav-avatar-fallback {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #1d4ed8;
            font-size: 14px;
            font-weight: 700;
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        }

        .manager-nav-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body class="layui-layout-body layuimini-all">
<div class="layui-layout layui-layout-admin">
    <div class="layui-header header">
        <div class="layui-logo layuimini-logo"></div>
        <div class="layuimini-header-content">
            <a href="javascript:;">
                <div class="layuimini-tool"><i title="展开" class="fa fa-outdent" data-side-fold="1"></i></div>
            </a>

            <ul class="layui-nav layui-layout-left layuimini-header-menu layuimini-header-menu-mobile-open"></ul>

            <ul class="layui-nav layui-layout-right">
                <li class="layui-nav-item" lay-unselect>
                    <a href="javascript:;" data-refresh="刷新"><i class="fa fa-refresh"></i></a>
                </li>
                <li class="layui-nav-item mobile layui-hide-xs" lay-unselect>
                    <a href="javascript:;" data-check-screen="full"><i class="fa fa-arrows-alt"></i></a>
                </li>
                <li class="layui-nav-item layuimini-setting">
                    <a href="javascript:;" id="managerAccount" class="manager-nav-link"></a>
                    <dl class="layui-nav-child">
                        <dd>
                            <a href="javascript:;" layuimini-content-href="../user/profile.html" data-title="个人资料" data-icon="fa fa-user-circle">个人资料</a>
                        </dd>
                        <dd>
                            <a href="javascript:;" layuimini-content-href="../user/user-password.html" data-title="修改密码" data-icon="fa fa-key">修改密码</a>
                        </dd>
                        <dd>
                            <hr>
                        </dd>
                        <dd>
                            <a href="javascript:;" class="login-out">退出登录</a>
                        </dd>
                    </dl>
                </li>
                <li class="layui-nav-item layuimini-select-bgcolor" lay-unselect>
                    <a href="javascript:;" data-bgcolor="配色"><i class="fa fa-ellipsis-v"></i></a>
                </li>
            </ul>
        </div>
    </div>

    <div class="layui-side layui-bg-black layuimini-menu-left"></div>

    <div class="layuimini-loader">
        <div class="layuimini-loader-inner"></div>
    </div>

    <div class="layuimini-make"></div>
    <div class="layuimini-site-mobile"><i class="layui-icon"></i></div>

    <div class="layui-body">
        <div class="layuimini-tab layui-tab-rollTool layui-tab" lay-filter="layuiminiTab" lay-allowclose="true">
            <ul class="layui-tab-title">
                <li class="layui-this" id="layuiminiHomeTabId" lay-id=""></li>
            </ul>
            <div class="layui-tab-control">
                <li class="layuimini-tab-roll-left layui-icon layui-icon-left"></li>
                <li class="layuimini-tab-roll-right layui-icon layui-icon-right"></li>
                <li class="layui-tab-tool layui-icon layui-icon-down">
                    <ul class="layui-nav close-box">
                        <li class="layui-nav-item">
                            <a href="javascript:;"><span class="layui-nav-more"></span></a>
                            <dl class="layui-nav-child">
                                <dd><a href="javascript:;" layuimini-tab-close="current">关闭当前</a></dd>
                                <dd><a href="javascript:;" layuimini-tab-close="other">关闭其他</a></dd>
                                <dd><a href="javascript:;" layuimini-tab-close="all">关闭全部</a></dd>
                            </dl>
                        </li>
                    </ul>
                </li>
            </div>
            <div class="layui-tab-content">
                <div id="layuiminiHomeTabIframe" class="layui-tab-item layui-show"></div>
            </div>
        </div>
    </div>
</div>

<script src="../../libs/layui/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<script src="../../libs/layui/js/lay-config.js?v=2.0.0" charset="utf-8"></script>
<script src="../../js/AppConfig.js" charset="utf-8"></script>
<script src="../../js/admin-common.js" charset="utf-8"></script>
<script>
    if (!AdminApp.ensureLogin()) {
        throw new Error("Not logged in");
    }

    layui.use(["jquery", "layer", "miniAdmin", "miniTongji"], function () {
        var $ = layui.jquery;
        var layer = layui.layer;
        var miniAdmin = layui.miniAdmin;
        var miniTongji = layui.miniTongji;

        function renderManagerNav() {
            var avatar = AdminApp.getManagerAvatar();
            var name = AdminApp.escapeHtml(AdminApp.getManagerDisplayName());
            var avatarHtml = avatar
                ? '<img class="manager-nav-avatar" src="' + AdminApp.escapeHtml(AdminApp.resolveFileUrl(avatar)) + '" alt="manager avatar">'
                : '<span class="manager-nav-avatar manager-nav-avatar-fallback">' + AdminApp.escapeHtml(AdminApp.getManagerInitial()) + '</span>';
            $("#managerAccount").html(avatarHtml + '<span class="manager-nav-name">' + name + "</span>");
        }

        window.refreshManagerHeader = renderManagerNav;

        renderManagerNav();

        miniAdmin.render({
            iniUrl: "../../data/init.json",
            clearUrl: "../../libs/layui/api/clear.json",
            urlHashLocation: true,
            bgColorDefault: false,
            multiModule: false,
            menuChildOpen: false,
            loadingTime: 0,
            pageAnim: true,
            maxTabNum: 20
        });

        miniTongji.render({
            specific: false
        });

        AdminApp.refreshManagerSession().then(function () {
            renderManagerNav();
        }).catch(function () {
            renderManagerNav();
        });

        $(".login-out").on("click", function () {
            layer.confirm("确认退出当前后台账号吗？", function (index) {
                layer.close(index);
                AdminApp.logout();
            });
        });
    });
</script>
</body>
</html>
