<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>修改密码</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../libs/layui/lib/layui-v2.5.5/css/layui.css" media="all">
    <link rel="stylesheet" href="../../libs/layui/css/public.css" media="all">
</head>
<body>
<div class="layuimini-container">
    <div class="layuimini-main">
        <form class="layui-form layui-form-pane" lay-filter="passwordForm" style="max-width: 560px;">
            <div class="layui-form-item">
                <label class="layui-form-label">当前账号</label>
                <div class="layui-input-block">
                    <input type="text" id="managerAccount" class="layui-input" readonly>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">旧密码</label>
                <div class="layui-input-block">
                    <input type="password" name="oldPassword" lay-verify="required" autocomplete="off" placeholder="请输入旧密码" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">新密码</label>
                <div class="layui-input-block">
                    <input type="password" name="newPassword" lay-verify="required" autocomplete="off" placeholder="请输入不少于 6 位的新密码" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">确认密码</label>
                <div class="layui-input-block">
                    <input type="password" name="confirmPassword" lay-verify="required" autocomplete="off" placeholder="请再次输入新密码" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <button class="layui-btn layui-btn-normal" lay-submit lay-filter="savePassword">保存修改</button>
            </div>
        </form>
    </div>
</div>

<script src="../../libs/layui/lib/layui-v2.5.5/layui.js" charset="utf-8"></script>
<script src="../../js/AppConfig.js" charset="utf-8"></script>
<script src="../../js/admin-common.js" charset="utf-8"></script>
<script>
    layui.use(['form', 'layer', 'jquery'], function () {
        var form = layui.form;
        var layer = layui.layer;
        var $ = layui.jquery;

        if (!AdminApp.ensureLogin()) {
            return;
        }

        $('#managerAccount').val(AdminApp.getManagerAccount());

        form.on('submit(savePassword)', function (data) {
            var field = data.field || {};
            if ((field.newPassword || '').length < 6) {
                layer.msg('新密码至少需要 6 位');
                return false;
            }
            if (field.newPassword !== field.confirmPassword) {
                layer.msg('两次输入的新密码不一致');
                return false;
            }

            AdminApp.postJson('/manager/changePassword', {
                id: AdminApp.getManagerId(),
                oldPassword: field.oldPassword,
                newPassword: field.newPassword
            }).then(function (result) {
                if (result.code !== 1) {
                    layer.alert(result.msg || '修改密码失败');
                    return;
                }
                layer.msg('密码修改成功，请重新登录', function () {
                    AdminApp.logout();
                });
            }).catch(function (xhr) {
                AdminApp.handleHttpError(xhr);
            });
            return false;
        });
    });
</script>
</body>
</html>
